version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "maintenance"
    open-pull-requests-limit: 5
    groups:
      all-composer:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "maintenance"
    open-pull-requests-limit: 5
    groups:
      all-npm:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "maintenance"
    open-pull-requests-limit: 5
    groups:
      all-actions:
        patterns:
          - "*"