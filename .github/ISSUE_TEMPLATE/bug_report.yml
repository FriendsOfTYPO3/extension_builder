name: Bug Report
description: Create a report to help us improve
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the form below.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.

  - type: dropdown
    id: typo3-version
    attributes:
      label: TYPO3 Version
      options:
        - "14.3"
        - "13.4"
        - "other"
    validations:
      required: true

  - type: input
    id: extension-version
    attributes:
      label: Extension Builder Version
      description: Git branch, commit hash or TER version
      placeholder: "e.g. main, 14.0.0"
    validations:
      required: true

  - type: dropdown
    id: php-version
    attributes:
      label: PHP Version
      options:
        - "8.4"
        - "8.3"
        - "8.2"
        - "other"
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      description: If this is a UI issue, which browser are you using?
      placeholder: "e.g. Chrome 125, Firefox 128"

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context about the problem here (logs, error messages, etc.).
