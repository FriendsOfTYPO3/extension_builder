name: codechecking

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches-ignore:
      - main
      - master
      - develop

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  rectortest:
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Setup PHP"
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          coverage: none

      - name: "Install dependencies"
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: "Run Rector (dry-run)"
        run: .Build/bin/rector process --dry-run

  php-cs-fixer:
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Setup PHP"
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          coverage: none

      - name: "Install dependencies"
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: "Run PHP CS Fixer (dry-run)"
        run: .Build/bin/php-cs-fixer fix --config=.php-cs-fixer.php -v --dry-run --stop-on-violation --using-cache=no

  eslint:
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Setup pnpm"
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: "Setup Node"
        uses: actions/setup-node@v3
        with:
          node-version: 20.x

      - name: "Install dependencies"
        run: pnpm install --frozen-lockfile

      - name: "Run ESLint"
        run: pnpm run lint:js

  prettier:
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Setup pnpm"
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: "Setup Node"
        uses: actions/setup-node@v3
        with:
          node-version: 20.x

      - name: "Install dependencies"
        run: pnpm install --frozen-lockfile

      - name: "Run Prettier format check"
        run: pnpm run lint:format

  phpstan:
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Setup PHP"
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          coverage: none

      - name: "Install dependencies"
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: "Run PHPStan"
        run: .Build/bin/phpstan analyse --no-progress

  sass-linter:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Setup pnpm"
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: "Setup Node"
        uses: actions/setup-node@v3
        with:
          node-version: 20.x

      - name: "Install dependencies"
        run: pnpm install --frozen-lockfile

      - name: "Run sass-linter"
        run: pnpm run lint:scss
