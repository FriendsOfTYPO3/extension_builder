name: codechecking

on:
  push:
    branches-ignore:
      - develop

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rectortest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6

      - name: "Setup PHP"
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          coverage: none

      - name: "Cache Composer dependencies"
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: composer-php8.4-${{ hashFiles('composer.json') }}

      - name: "Install dependencies"
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: "Run Rector (dry-run)"
        run: .Build/bin/rector process --dry-run

  php-cs-fixer:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6

      - name: "Setup PHP"
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          coverage: none

      - name: "Cache Composer dependencies"
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: composer-php8.4-${{ hashFiles('composer.json') }}

      - name: "Install dependencies"
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: "Run PHP CS Fixer (dry-run)"
        run: .Build/bin/php-cs-fixer fix --config=.php-cs-fixer.php -v --dry-run --stop-on-violation --using-cache=no

  eslint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6

      - name: "Setup pnpm"
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: "Setup Node"
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: "Install dependencies"
        run: pnpm install --frozen-lockfile

      - name: "Run ESLint"
        run: pnpm run lint:js

  prettier:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6

      - name: "Setup pnpm"
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: "Setup Node"
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: "Install dependencies"
        run: pnpm install --frozen-lockfile

      - name: "Run Prettier format check"
        run: pnpm run lint:format

  phpstan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6

      - name: "Setup PHP"
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          coverage: none

      - name: "Cache Composer dependencies"
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: composer-php8.4-${{ hashFiles('composer.json') }}

      - name: "Install dependencies"
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: "Run PHPStan"
        run: .Build/bin/phpstan analyse --no-progress

  sass-linter:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6

      - name: "Setup pnpm"
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: "Setup Node"
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: "Install dependencies"
        run: pnpm install --frozen-lockfile

      - name: "Run sass-linter"
        run: pnpm run lint:scss
