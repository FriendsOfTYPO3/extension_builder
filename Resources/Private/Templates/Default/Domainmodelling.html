<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">

<f:layout name="Module" />

<f:section name="Content">
	<style>
		.module-body { padding: 0 !important; }
	</style>
<eb-wiring-editor
		smd-url="{dispatchRpcUrl}"
		initial-warnings="{f:format.json(value: initialWarnings)}"
		composer-warning="{composerWarning ? '1' : ''}"
		style="width:100%;height:calc(100vh - var(--module-docheader-height, 67px))">
	</eb-wiring-editor>
</f:section>
</html>
