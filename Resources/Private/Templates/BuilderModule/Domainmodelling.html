<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true"
      xmlns:eb="http://typo3.org/ns/EBT/ExtensionBuilder/ViewHelpers">

<f:layout name="Default" />

<f:section name="Content">
	<div id="domainModelEditor">
		<div id="left">
			<div id="propertiesForm"></div>
		</div>
		<div id="center">
			<div id="moduleBar"></div>
			<div id="modelingLayer"></div>
		</div>
		<div id="helpPanel"></div>
	</div>
	<script type="text/javascript" nonce="{f:security.nonce()}">
		// Pre-populate TYPO3.settings namespace so synchronously-loaded JS files can use it in onDOMReady
		window.TYPO3 = window.TYPO3 || {};
		window.TYPO3.settings = window.TYPO3.settings || {};
		window.TYPO3.settings.extensionBuilder = window.TYPO3.settings.extensionBuilder || {};
		window.TYPO3.settings.extensionBuilder.publicResourceWebPath = { core: "{corePublicResourceWebPath}" };

		// InputEx needs a correct path to this image
		inputEx.spacerUrl = "{publicResourcesUrl}/jsDomainModeling/wireit/lib/inputex/images/space.gif";

		YAHOO.util.Event.onDOMReady(function() {
			const editor = new WireIt.WiringEditor(extbaseModeling_wiringEditorLanguage);
			const initialWarnings = {initialWarnings -> f:format.json() -> f:format.raw()};
			if (initialWarnings.length > 0) {
				editor.alert('Warning', initialWarnings.join('<br />'));
			}
		});
	</script>
</f:section>
</html>
